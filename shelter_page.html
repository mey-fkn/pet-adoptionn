<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Your Pet - Dashboard</title>
  <link rel="stylesheet" href="../css/SHEARED.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <div class="dashboard-layout">
    
    <aside class="sidebar glass-panel">
      <div class="logo">
        <i class="ph-fill ph-paw-print"></i>
        <span>FindYourPet</span>
      </div>
      
      <ul class="nav-menu">
        <li class="nav-item active">
          <a href="#"><i class="ph ph-squares-four"></i> Dashboard</a>
        </li>
        <li class="nav-item">
          <a href="#"><i class="ph ph-dog"></i> Pet Registry</a>
        </li>
        <li class="nav-item">
          <a href="#"><i class="ph ph-heartbeat"></i> Medical Records</a>
        </li>
        <li class="nav-item">
          <a href="#"><i class="ph ph-users"></i> Adoption Requests</a>
        </li>
        <li class="nav-item settings-item">
          <a href="#"><i class="ph ph-gear"></i> Settings</a>
        </li>
      </ul>

      <button class="btn-primary">
        <i class="ph ph-plus" style="margin-right: 6px; vertical-align: middle;"></i>Add New Shelter
      </button>
    </aside>

    <header class="header glass-panel">
      <div class="header-title">
        <h1>Overview</h1>
        <p>Welcome back! Here's what's happening at the shelter today.</p>
      </div>

      <div class="header-actions">
        <button class="notification-bell">
          <i class="ph ph-bell"></i>
          <span class="badge">0</span>
        </button>

        <div class="user-profile">
          <div class="user-info">
            <h4>fakani mey
            </h4>
            <span>Shelter Admin</span>
          </div>
          <i class="ph ph-caret-down" style="color: var(--color-text-muted);"></i>
        </div>
      </div>
    </header>

    <main class="main-content">
        </main>
    
  </div>
</body>
</html>
