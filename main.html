<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Pet - Main</title>
    <link rel="stylesheet" href="../css/browsing_page.css">
    <script src="../js/hamburger.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>



<body>
    <nav class="navbar">
        <div class="logo">
            <i class="ph-fill ph-paw-print"></i>
            <span>FindYourPet</span>
        </div>
        
        <ul class="nav-menu">
            <li><a href="../sheared_pages/main.html">home</a></li>
            <li><a href="../sheared_pages/browsing_page.html"><i class="ph ph-magnifying-glass"></i> find pets</a></li>
            <li><a href="../sheared_pages/shelter_page.html"><i class="ph ph-question-mark"></i> find shelters</a></li>
            <li><a href="#"><i class="ph ph-info"></i> how it works</a></li>
        </ul>
        
        <div class="login">
            <a href="../auth/signin_login.html" class="signin-btn"><i class="ph ph-user"></i> Sign In</a>
        </div>

        <div class="hamburger" id="hamburger-btn">
            <i class="ph ph-list"></i>
        </div>
    </nav>

    <aside class="sidebar" id="sidebar">
        <div class="close-btn" id="close-btn">
            <i class="ph ph-x"></i>
        </div>
        <div class="logo">
            <i class="ph-fill ph-paw-print"></i>
            <span>FindYourPet</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="../sheared_pages/main.html">Home</a></li>
            <li><a href="../sheared_pages/browsing_page.html">Find Pets</a></li>
            <li><a href="../sheared_pages/shelter_page.html">Shelters</a></li>
            <li><a href="#">How it works</a></li>
            <li><a href="../auth/signin_login.html">Sign In</a></li>
        </ul>
    </aside>

    <main class="hero-section">
        <div class="content">
            <h1 class="HOLL">
                Be a Voice for the Voiceless.
                <span>Save Lives.</span>
            </h1>
            <div class="btn-group">
               <a href="../sheared_pages/browsing_page.html"><button class="btn-pet">Browse Pets</button></a> 
                <a href="../sheared_pages/shelter_page.html"><button class="btn-shel">Browse Shelters</button></a>
            </div>
        </div>
    </main>

    <script>
        // كود بسيط لفتح واغلاق القائمة الجانبية
        const hamburger = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('close-btn');

        hamburger.onclick = () => sidebar.classList.add('active');
        closeBtn.onclick = () => sidebar.classList.remove('active');
    </script>
</body>
</html>
